name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: energia
          POSTGRES_USER: energia
          POSTGRES_PASSWORD: changeme
        ports:
          # Match the local docker-compose host port (5434) so Settings' defaults
          # (POSTGRES_HOST=localhost, POSTGRES_HOST_PORT=5434) work unchanged in CI.
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U energia -d energia"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_HOST: localhost
      POSTGRES_HOST_PORT: 5434
      POSTGRES_DB: energia
      POSTGRES_USER: energia
      POSTGRES_PASSWORD: changeme

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (editable, with dev extras)
        run: pip install -e "backend/[dev]"

      - name: Lint (ruff check)
        working-directory: backend
        run: ruff check .

      - name: Format check (ruff format --check)
        working-directory: backend
        run: ruff format --check .

      - name: Typecheck (mypy)
        working-directory: backend
        run: mypy src

      - name: Test (unit + integration, coverage gate enforced via pyproject.toml)
        working-directory: backend
        run: pytest

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      # actions/setup-node's `cache: pnpm` shells out to `pnpm store path`, so pnpm must already
      # be on PATH -- this step must come after "Set up pnpm", not before.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install (frozen lockfile)
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint (eslint)
        working-directory: frontend
        run: pnpm lint

      - name: Typecheck (tsc --noEmit)
        working-directory: frontend
        run: pnpm typecheck

      - name: Test (unit + component, coverage gate enforced via vite.config.ts)
        working-directory: frontend
        run: pnpm test

      - name: Build (vite build)
        working-directory: frontend
        run: pnpm build

      - name: Install Playwright browsers (chromium)
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      # Mocks /api/v1/suministros at the network level via page.route() against a `vite preview`
      # build compiled with VITE_API_BASE_URL="" (see e2e/playwright.config.ts): no real backend
      # involved. A real-backend E2E job lands with the Dashboard Ejecutivo slice.
      - name: Test E2E (Playwright smoke, mocked API)
        working-directory: frontend
        run: pnpm run test:e2e
