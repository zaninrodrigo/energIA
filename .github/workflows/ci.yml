name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: energia
          POSTGRES_USER: energia
          POSTGRES_PASSWORD: changeme
        ports:
          # Match the local docker-compose host port (5434) so Settings' defaults
          # (POSTGRES_HOST=localhost, POSTGRES_HOST_PORT=5434) work unchanged in CI.
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U energia -d energia"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_HOST: localhost
      POSTGRES_HOST_PORT: 5434
      POSTGRES_DB: energia
      POSTGRES_USER: energia
      POSTGRES_PASSWORD: changeme

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (editable, with dev extras)
        run: pip install -e "backend/[dev]"

      - name: Lint (ruff check)
        working-directory: backend
        run: ruff check .

      - name: Format check (ruff format --check)
        working-directory: backend
        run: ruff format --check .

      - name: Typecheck (mypy)
        working-directory: backend
        run: mypy src

      - name: Test (unit + integration, coverage gate enforced via pyproject.toml)
        working-directory: backend
        run: pytest
